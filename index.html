<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video İndirme Pro - Ücretsiz & Hızlı</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #121212; color: white; padding-top: 50px; }
        .main-card { background: #1e1e1e; border-radius: 15px; padding: 30px; box-shadow: 0 0 20px rgba(0,255,0,0.1); }
        .btn-success { background: #28a745; border: none; font-weight: bold; }
        .ad-space { margin-top: 30px; border: 1px dashed #444; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center main-card">
                <h1 class="mb-4">🚀 Video İndirme Merkezi</h1>
                <p class="text-secondary">YouTube, Instagram ve TikTok videolarını saniyeler içinde indir.</p>
                
                <div class="input-group mb-3">
                    <input id="videoUrl" type="text" class="form-control" placeholder="Video linkini yapıştır kanka...">
                    <button class="btn btn-success" onclick="downloadVideo()">İNDİR</button>
                </div>

                <div id="status" class="mt-3 text-info"></div>

                <div class="ad-space">
                    <h5>🔥 En Popüler Kanalımız</h5>
                    <p>En yeni dini paylaşımları kaçırmamak için abone ol!</p>
                    <a href="https://youtube.com/@KANAL_LINKIN" target="_blank" class="btn btn-outline-danger">Kanalı Gör</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function downloadVideo() {
            const url = document.getElementById('videoUrl').value;
            if(!url) { alert("Link nerede kanka?"); return; }
            document.getElementById('status').innerText = "Video analiz ediliyor, lütfen bekle...";
            // Buraya ileride indirme API'sini bağlayacağız
            setTimeout(() => {
                alert("Sistem şu an bakımda kanka, YouTube botun mermileri bitirince burayı aktif edeceğiz!");
            }, 2000);
        }
    </script>
</body>
</html>
