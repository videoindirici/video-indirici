<script>
async function downloadVideo() {
    const url = document.getElementById('videoUrl').value;
    const status = document.getElementById('status');
    
    if(!url) { alert("Link nerede kanka?"); return; }
    
    status.innerText = "🚀 Video analiz ediliyor, lütfen bekle...";

    const options = {
        method: 'POST', // Bu API POST istiyor
        headers: {
            'content-type': 'application/json',
            'x-rapidapi-key': 'a3bf3b87a1msh0c6eeeb83253221p1fc78ajsn7db1a79e4ec5', // Senin resmindeki key
            'x-rapidapi-host': 'social-download-all-in-one.p.rapidapi.com' // Senin resmindeki host
        },
        body: JSON.stringify({ url: url })
    };

    try {
        const response = await fetch('https://social-download-all-in-one.p.rapidapi.com/v1/social/autolink', options);
        const result = await response.json();
        
        // API'den dönen cevaba göre linki veriyoruz
        if(result && result.url) {
            status.innerHTML = `<a href="${result.url}" class="btn btn-primary mt-2" target="_blank">✅ VİDEOYU ŞİMDİ İNDİR</a>`;
        } else {
            status.innerText = "❌ Hata: Video bulunamadı. Linki kontrol et kanka.";
        }
    } catch (error) {
        status.innerText = "❌ API bağlantı hatası! Günlük limit dolmuş olabilir.";
    }
}
</script>
