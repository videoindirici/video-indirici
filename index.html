<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="monetag" content="1be482ca371cd895e00bed15d23f3e72">

    <script src="https://quge5.com/88/tag.min.js" data-zone="219098" async data-cfasync="false"></script>

    <title>Video İndirici Pro - Ücretsiz & Hızlı Video İndirme</title>
    <meta name="description" content="Instagram, TikTok ve YouTube videolarını ücretsiz ve HD kalitede indir.">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0f0f0f; color: white; padding-top: 50px; font-family: sans-serif; }
        .main-card { background: #1a1a1a; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        .btn-success { background: #28a745; border: none; font-weight: bold; padding: 15px; width: 100%; cursor: pointer; }
        .form-control { background: #2b2b2b; border: 1px solid #444; color: white; padding: 12px; }
        .form-control:focus { background: #333; color: white; border-color: #28a745; box-shadow: none; }
        .ad-space { margin-top: 30px; border: 1px dashed #555; padding: 20px; border-radius: 15px; background: #222; }
        .btn-download { background: #007bff; border: none; font-weight: bold; padding: 15px; width: 100%; color: white; text-decoration: none; display: inline-block; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center main-card">
                <h1 class="mb-4">🚀 Video İndirici Pro</h1>
                <p class="text-secondary mb-4">TikTok, Instagram ve YouTube linkini yapıştır kanka.</p>
                
                <div class="mb-3">
                    <input id="videoUrl" type="text" class="form-control mb-3" placeholder="Link buraya...">
                    <button class="btn btn-success" id="analyzeBtn" onclick="downloadVideo()">VİDEOYU ANALİZ ET</button>
                </div>

                <div id="status" class="mt-4"></div>

                <div class="ad-space">
                    <h5 class="text-warning">🔥 Kanallarımıza Abone Ol</h5>
                    <p class="small text-secondary">Yeni videoları kaçırmamak için tıkla!</p>
                    <a href="https://youtube.com" target="_blank" class="btn btn-outline-danger btn-sm">Kanalı Gör</a>
                </div>
            </div>
        </div>
    </div>

    <script>
    async function downloadVideo() {
        const url = document.getElementById('videoUrl').value;
        const status = document.getElementById('status');
        if(!url) { alert("Link boş kanka!"); return; }
        
        status.innerHTML = '<div class="spinner-border text-success" role="status"></div><br>Analiz ediliyor...';

        const options = {
            method: 'POST',
            headers: {
                'content-type': 'application/json',
                'x-rapidapi-key': 'a3bf3b87a1msh0c6eeeb83253221p1fc78ajsn7db1a79e4ec5',
                'x-rapidapi-host': 'social-download-all-in-one.p.rapidapi.com'
            },
            body: JSON.stringify({ url: url })
        };

        try {
            const response = await fetch('https://social-download-all-in-one.p.rapidapi.com/v1/social/autolink', options);
            const result = await response.json();
            if(result && result.url) {
                // Video bulununca reklam tetiklemek için bir 'fake' tıklama katmanı ekliyoruz
                status.innerHTML = `
                    <div class="alert alert-success">Video Hazır!</div>
                    <p class="small text-secondary">Aşağıdaki butona bastığında indirme başlayacaktır.</p>
                    <a href="${result.url}" class="btn-download" target="_blank" rel="noopener">📥 ŞİMDİ CİHAZA İNDİR</a>
                `;
            } else {
                status.innerHTML = '<div class="alert alert-danger">❌ Hata: Video bulunamadı.</div>';
            }
        } catch (error) {
            status.innerHTML = '<div class="alert alert-warning">❌ Bağlantı hatası oluştu.</div>';
        }
    }
    </script>
</body>
</html>
